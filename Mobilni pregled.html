<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobilni pregled — VIDIK</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:Georgia,serif; background:#2b2620; min-height:100vh; display:flex; flex-direction:column; align-items:center; gap:20px; padding:32px 16px; }
  h1{ color:#EAD9BE; font-size:15px; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; }
  .row{ display:flex; flex-wrap:wrap; gap:40px; justify-content:center; align-items:flex-start; }
  .phone{ display:flex; flex-direction:column; align-items:center; gap:12px; }
  .phone .label{ color:rgba(244,239,230,0.6); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; }
  .frame{ width:390px; height:800px; border:12px solid #14120e; border-radius:44px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.5); background:#F4EFE6; position:relative; }
  .frame iframe{ width:390px; height:776px; border:0; display:block; }
  .notch{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:150px; height:26px; background:#14120e; border-radius:0 0 16px 16px; z-index:2; }
</style>
</head>
<body>
  <h1>Mobilni pregled · 390px</h1>
  <div class="row">
    <div class="phone">
      <div class="label">Početna</div>
      <div class="frame"><div class="notch"></div><iframe src="Vikendica Vidik.dc.html"></iframe></div>
    </div>
    <div class="phone">
      <div class="label">Galerija</div>
      <div class="frame"><div class="notch"></div><iframe src="Galerija.dc.html"></iframe></div>
    </div>
    <div class="phone">
      <div class="label">Meni</div>
      <div class="frame"><div class="notch"></div><iframe src="Meni.dc.html"></iframe></div>
    </div>
    <div class="phone">
      <div class="label">Rezervacija</div>
      <div class="frame"><div class="notch"></div><iframe src="Rezervacija.dc.html"></iframe></div>
    </div>
    <div class="phone">
      <div class="label">Utisci gostiju</div>
      <div class="frame"><div class="notch"></div><iframe src="Utisci.dc.html"></iframe></div>
    </div>
    <div class="phone">
      <div class="label">Okolina</div>
      <div class="frame"><div class="notch"></div><iframe src="Okolina.dc.html"></iframe></div>
    </div>
  </div>
</body>
</html>
